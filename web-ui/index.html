<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leonardo API - Testing UI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 3em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .card h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            min-height: 100px;
            resize: vertical;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .result {
            margin-top: 20px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 8px;
            display: none;
        }

        .result.show {
            display: block;
        }

        .result.success {
            background: #d4edda;
            border: 2px solid #c3e6cb;
            color: #155724;
        }

        .result.error {
            background: #f8d7da;
            border: 2px solid #f5c6cb;
            color: #721c24;
        }

        .result pre {
            background: white;
            padding: 15px;
            border-radius: 6px;
            overflow-x: auto;
            margin-top: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-processing {
            background: #fff3cd;
            color: #856404;
        }

        .status-completed {
            background: #d4edda;
            color: #155724;
        }

        .status-failed {
            background: #f8d7da;
            color: #721c24;
        }

        .image-result {
            margin-top: 20px;
        }

        .image-result img {
            max-width: 100%;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎨 Leonardo API</h1>
            <p>Testing Interface</p>
        </div>

        <!-- Login Section -->
        <div class="card" id="loginCard">
            <h2>🔐 Login</h2>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail" value="admin@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" value="admin123">
            </div>
            <button onclick="login()">Login</button>
            <div id="loginResult" class="result"></div>
        </div>

        <!-- API Key Section -->
        <div class="card" id="apiKeyCard" style="display:none;">
            <h2>🔑 API Key</h2>
            <div class="form-group">
                <label>Your API Key</label>
                <input type="text" id="apiKey" placeholder="Enter your API key or generate one">
            </div>
            <button onclick="generateApiKey()">Generate New API Key</button>
            <div id="apiKeyResult" class="result"></div>
        </div>

        <!-- Generate Image Section -->
        <div class="card" id="generateCard" style="display:none;">
            <h2>🎨 Generate Image</h2>
            <div class="form-group">
                <label>Prompt</label>
                <textarea id="prompt" placeholder="a beautiful cat sitting on a chair">a beautiful cat sitting on a chair</textarea>
            </div>
            <div class="grid">
                <div class="form-group">
                    <label>Model</label>
                    <select id="model">
                        <option value="phoenix">Phoenix</option>
                        <option value="leonardo-diffusion">Leonardo Diffusion</option>
                        <option value="leonardo-creative">Leonardo Creative</option>
                        <option value="kino-xl">Kino XL</option>
                        <option value="anime-xl">Anime XL</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Width</label>
                    <input type="number" id="width" value="1024">
                </div>
                <div class="form-group">
                    <label>Height</label>
                    <input type="number" id="height" value="1024">
                </div>
            </div>
            <button onclick="generateImage()" id="generateBtn">Generate Image</button>
            <div id="generateResult" class="result"></div>
            <div id="imageResult" class="image-result"></div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;
        let jwtToken = localStorage.getItem('jwt_token');
        let apiKey = localStorage.getItem('api_key');

        // Initialize
        if (jwtToken) {
            document.getElementById('loginCard').style.display = 'none';
            document.getElementById('apiKeyCard').style.display = 'block';
        }

        if (apiKey) {
            document.getElementById('apiKey').value = apiKey;
            document.getElementById('generateCard').style.display = 'block';
        }

        async function login() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const response = await fetch(`${API_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    jwtToken = data.token;
                    localStorage.setItem('jwt_token', jwtToken);
                    showResult('loginResult', 'success', 'Login successful!');
                    
                    setTimeout(() => {
                        document.getElementById('loginCard').style.display = 'none';
                        document.getElementById('apiKeyCard').style.display = 'block';
                    }, 1000);
                } else {
                    showResult('loginResult', 'error', data.error || 'Login failed');
                }
            } catch (error) {
                showResult('loginResult', 'error', error.message);
            }
        }

        async function generateApiKey() {
            try {
                const response = await fetch(`${API_URL}/api/keys`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${jwtToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ name: 'Test Key', rateLimit: 1000 })
                });

                const data = await response.json();

                if (response.ok) {
                    apiKey = data.apiKey.key;
                    localStorage.setItem('api_key', apiKey);
                    document.getElementById('apiKey').value = apiKey;
                    document.getElementById('generateCard').style.display = 'block';
                    showResult('apiKeyResult', 'success', `API Key generated: ${apiKey}`);
                } else {
                    showResult('apiKeyResult', 'error', data.error || 'Failed to generate API key');
                }
            } catch (error) {
                showResult('apiKeyResult', 'error', error.message);
            }
        }

        async function generateImage() {
            const prompt = document.getElementById('prompt').value;
            const model = document.getElementById('model').value;
            const width = parseInt(document.getElementById('width').value);
            const height = parseInt(document.getElementById('height').value);
            const currentApiKey = document.getElementById('apiKey').value;

            if (!currentApiKey) {
                showResult('generateResult', 'error', 'Please enter an API key');
                return;
            }

            const btn = document.getElementById('generateBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span> Generating...';

            try {
                const response = await fetch(`${API_URL}/api/generate`, {
                    method: 'POST',
                    headers: {
                        'X-API-Key': currentApiKey,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ prompt, model, width, height })
                });

                const data = await response.json();

                if (response.ok) {
                    showResult('generateResult', 'success', `Generation started! ID: ${data.generation.id}`);
                    
                    // Poll for result
                    pollGeneration(data.generation.id, currentApiKey);
                } else {
                    showResult('generateResult', 'error', data.error || 'Generation failed');
                    btn.disabled = false;
                    btn.innerHTML = 'Generate Image';
                }
            } catch (error) {
                showResult('generateResult', 'error', error.message);
                btn.disabled = false;
                btn.innerHTML = 'Generate Image';
            }
        }

        async function pollGeneration(id, key) {
            const maxAttempts = 60; // 5 minutes
            let attempts = 0;

            const interval = setInterval(async () => {
                attempts++;

                try {
                    const response = await fetch(`${API_URL}/api/generation/${id}`, {
                        headers: { 'X-API-Key': key }
                    });

                    const data = await response.json();

                    if (data.generation.status === 'completed') {
                        clearInterval(interval);
                        showResult('generateResult', 'success', 'Generation completed!');
                        
                        if (data.generation.result_url) {
                            document.getElementById('imageResult').innerHTML = `
                                <img src="${data.generation.result_url}" alt="Generated image">
                            `;
                        }

                        const btn = document.getElementById('generateBtn');
                        btn.disabled = false;
                        btn.innerHTML = 'Generate Image';
                    } else if (data.generation.status === 'failed') {
                        clearInterval(interval);
                        showResult('generateResult', 'error', 'Generation failed: ' + data.generation.error);
                        
                        const btn = document.getElementById('generateBtn');
                        btn.disabled = false;
                        btn.innerHTML = 'Generate Image';
                    } else if (attempts >= maxAttempts) {
                        clearInterval(interval);
                        showResult('generateResult', 'error', 'Generation timeout');
                        
                        const btn = document.getElementById('generateBtn');
                        btn.disabled = false;
                        btn.innerHTML = 'Generate Image';
                    }
                } catch (error) {
                    console.error('Poll error:', error);
                }
            }, 5000); // Check every 5 seconds
        }

        function showResult(elementId, type, message) {
            const element = document.getElementById(elementId);
            element.className = `result show ${type}`;
            element.innerHTML = `<strong>${type === 'success' ? '✅' : '❌'}</strong> ${message}`;
        }
    </script>
</body>
</html>
